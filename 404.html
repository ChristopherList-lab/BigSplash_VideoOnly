<head>

  <link href="https://fonts.googleapis.com" rel="preconnect"/>

  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <style>
    body {
      background-color: #131318;
      color: #ddd8ce;
      font-family: 'Inter', sans-serif;
      margin: 0;
      overflow-x: hidden;
    }
    .font-anton { font-family: 'Anton', sans-serif; }
    .font-label { font-family: 'JetBrains Mono', monospace; }

    .text-glow-lime {
      text-shadow: 0 0 40px rgba(239, 248, 139, 0.45), 0 0 100px rgba(239, 248, 139, 0.18);
    }

    /* Film slate */
    .slate {
      position: relative;
      width: 260px;
      height: 200px;
      margin: 0 auto;
      perspective: 800px;
    }
    .slate-body {
      position: absolute;
      inset: 44px 0 0 0;
      background: #0e0e13;
      border: 2px solid rgba(239,248,139,0.8);
      border-radius: 2px;
      box-shadow: 0 0 60px rgba(239,248,139,0.15), inset 0 0 40px rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .slate-top {
      position: absolute;
      top: 0; left: -6px; right: -6px;
      height: 54px;
      background: repeating-linear-gradient(
        115deg,
        #131318 0 24px,
        #eff88b 24px 48px
      );
      border: 2px solid #eff88b;
      border-radius: 2px;
      transform-origin: bottom left;
      animation: slate-clap 2.2s cubic-bezier(0.5, 0, 0.2, 1) 0.3s 1 forwards;
    }
    @keyframes slate-clap {
      0%   { transform: rotate(-28deg); }
      50%  { transform: rotate(-28deg); }
      65%  { transform: rotate(2deg); }
      72%  { transform: rotate(-1deg); }
      78%  { transform: rotate(0.5deg); }
      100% { transform: rotate(0deg); }
    }
    .slate-text {
      font-family: 'Anton', sans-serif;
      font-size: 4.2rem;
      letter-spacing: 0.04em;
      color: #eff88b;
      line-height: 1;
      text-shadow: 0 0 30px rgba(239,248,139,0.4);
    }

    .abyssal-grain::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.03;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    ::selection { background: rgba(239, 248, 139, 0.35); color: #131318; }

    nav.scrolled {
      background: rgba(19, 19, 24, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
  </style>

  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#eff88b",
            "secondary": "#ddd8ce",
            "on-primary": "#2f3300",
            "on-surface": "#e4e1e9",
            "background": "#131318",
            "surface": "#131318",
            "surface-container-low": "#1b1b20",
          }
        }
      }
    }
  </script>
</head>

<body class="bg-background">

        <a href="index.html#work" class="group block border border-primary/20 hover:border-primary hover:bg-primary/5 transition-all duration-300 p-6">
          <p class="font-label text-primary text-[10px] tracking-[0.3em] uppercase mb-3">02</p>
          <h3 class="font-anton text-2xl uppercase leading-none text-on-surface mb-2 group-hover:text-primary transition-colors">Our Work</h3>
          <p class="text-stone-400 text-sm leading-relaxed">50+ projects for service businesses.</p>
        </a>

        <a href="index.html#contact" class="group block border border-primary/20 hover:border-primary hover:bg-primary/5 transition-all duration-300 p-6">

          <h3 class="font-anton text-2xl uppercase leading-none text-on-surface mb-2 group-hover:text-primary transition-colors">Get Started</h3>

  <script src="js/easter-eggs.js"></script>
